name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like?
      placeholder: A clear description of the feature.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed? What problem does it solve?
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which module would this affect?
      options:
        - core
        - data
        - desktop
        - gym-bridge
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any extra information, references, or mockups.
    validations:
      required: false
